<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CHISPA — Bóveda de ANDERSON</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #000000;
      --line: rgba(255,255,255,0.08);
      --soft: rgba(255,255,255,0.6);
      --text: rgba(255,255,255,0.95);
      --accent: #8df0c8;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden; height: 100vh; width: 100vw;
    }
    .app { position: relative; width: 100%; height: 100%; }
    .screen {
      position: absolute; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
      background: var(--bg);
    }
    .panel {
      width: 100%; max-width: 420px; min-height: 80vh;
      border: 1px solid var(--line); border-radius: 32px;
      padding: 40px 30px; display: flex; flex-direction: column;
      position: relative; /* Required for indicator alignment */
    }
    .direction { font-size: 10px; letter-spacing: 5px; color: var(--soft); text-transform: uppercase; margin-bottom: 5px; }
    h1 { font-size: 40px; font-weight: 300; margin-bottom: 15px; color: var(--accent); cursor: pointer; }
    
    /* NEW: Visual indicators for the right corner */
    .save-status {
      position: absolute; top: 40px; right: 30px;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--soft); transition: color 0.3s ease, opacity 0.3s ease;
      opacity: 0; pointer-events: none;
    }
    .save-status.active { opacity: 1; }
    .save-status.saving { color: var(--accent); }

    /* ÁREA DE ESCRITURA */
    .notepad {
      flex: 1; width: 100%; font-size: 22px; line-height: 1.5;
      outline: none; color: var(--text); overflow-y: auto;
      white-space: pre-wrap;
    }
    .notepad:empty:before { content: "Empieza a escribir..."; color: rgba(255,255,255,0.1); }

    /* Posicionamiento inicial */
    .north { transform: translateY(-100%); }
    .south { transform: translateY(100%); }
    .east { transform: translateX(100%); }
    .west { transform: translateX(-100%); }
    .active { transform: translate(0,0) !important; z-index: 10; }
  </style>
</head>
<body>

<div class="app">
  <!-- CENTRO -->
  <section class="screen active" id="center">
    <div class="panel">
      <div class="direction">[ Centro ]</div>
      <div class="save-status" id="status-center">Saved</div>
      <h1>CHISPA</h1>
      <div class="notepad" contenteditable="true" id="note-center"></div>
    </div>
  </section>

  <!-- NORTE: ESPÍRITU -->
  <section class="screen north" id="north">
    <div class="panel">
      <div class="direction">[ Norte ]</div>
      <div class="save-status" id="status-north">Saved</div>
      <h1>ESPÍRITU</h1>
      <div class="notepad" contenteditable="true" id="note-north"></div>
    </div>
  </section>

  <!-- SUR: CUERPO -->
  <section class="screen south" id="south">
    <div class="panel">
      <div class="direction">[ Sur ]</div>
      <div class="save-status" id="status-south">Saved</div>
      <h1>CUERPO</h1>
      <div class="notepad" contenteditable="true" id="note-south"></div>
    </div>
  </section>

  <!-- ESTE: CREATIVIDAD -->
  <section class="screen east" id="east">
    <div class="panel">
      <div class="direction">[ Este ]</div>
      <div class="save-status" id="status-east">Saved</div>
      <h1>NOVELA</h1>
      <div class="notepad" contenteditable="true" id="note-east"></div>
    </div>
  </section>

  <!-- OESTE: SERVICIO -->
  <section class="screen west" id="west">
    <div class="panel">
      <div class="direction">[ Oeste ]</div>
      <div class="save-status" id="status-west">Saved</div>
      <h1>SERVICIO</h1>
      <div class="notepad" contenteditable="true" id="note-west"></div>
    </div>
  </section>
</div>

<script>
  const screens = document.querySelectorAll('.screen');
  const notepads = document.querySelectorAll('.notepad');
  
  // Track unique save timeouts for each active block
  let saveTimeouts = {};

  function navigate(id) {
    screens.forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // Auto-guardado en LocalStorage
  notepads.forEach(pad => {
    // Get corresponding top-right status indicator element
    const statusId = pad.id.replace('note-', 'status-');
    const statusEl = document.getElementById(statusId);

    // Cargar datos al iniciar
    pad.innerText = localStorage.getItem(pad.id) || '';
    
    // Guardar al escribir con un loop de UI fluido
    pad.addEventListener('input', () => {
      // 1. Show "Saving..." right away in accent color
      if (statusEl) {
        statusEl.textContent = "Saving...";
        statusEl.classList.add('active', 'saving');
      }

      // 2. Clear previous timeout so it doesn't process mid-typing
      clearTimeout(saveTimeouts[pad.id]);

      // 3. Wait 800ms after you stop typing to commit the save execution
      saveTimeouts[pad.id] = setTimeout(() => {
        localStorage.setItem(pad.id, pad.innerText);
        
        // 4. Update to "Saved" confirmation
        if (statusEl) {
          statusEl.textContent = "Saved";
          statusEl.classList.remove('saving');
          
          // 5. Softly fade out the notification after 1.5 seconds of stillness
          setTimeout(() => {
            // Only fade out if state hasn't changed back to saving
            if (!statusEl.classList.contains('saving')) {
              statusEl.classList.remove('active');
            }
          }, 1500);
        }
      }, 800);
    });
  });

  // Navegación por Gestos (Swipe)
  let sX = 0, sY = 0;
  document.addEventListener('touchstart', e => {
    sX = e.touches[0].clientX;
    sY = e.touches[0].clientY;
  }, {passive: true});

  document.addEventListener('touchend', e => {
    if (document.activeElement.classList.contains('notepad')) return;
    
    let dX = e.changedTouches[0].clientX - sX;
    let dY = e.changedTouches[0].clientY - sY;

    if (Math.abs(dX) > Math.abs(dY) && Math.abs(dX) > 60) {
      dX > 0 ? navigate('west') : navigate('east');
    } else if (Math.abs(dY) > 60) {
      dY > 0 ? navigate('north') : navigate('south');
    }
  }, {passive: true});

  // Atajo: Tocar el título "Centro" para volver
  document.querySelectorAll('h1').forEach(h => {
    h.addEventListener('click', () => navigate('center'));
  });
</script>
</body>
</html>
